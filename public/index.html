<!DOCTYPE html>
<html>
<head>
    <title>DSA Bro</title>
    <link rel="stylesheet" href="style.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<body>
<div class="container">

    <div class="header">
        🤖 DSA Bro
        <div class="status">
            🟢 Online
        </div>
    </div>
        <div class="suggestions">
        <button class="suggestion-btn">Binary Search</button>
        <button class="suggestion-btn">Trees</button>
        <button class="suggestion-btn">Graphs</button>
        <button class="suggestion-btn">Dynamic Programming</button>
        <button class="suggestion-btn">Recursion</button>
    </div>
    <div id="chat-box"></div>

    <div class="input-area">

        <input
            type="text"
            id="user-input"
            placeholder="Ask a DSA question..."
        >

        <button id="send-btn">
            Send
        </button>

    </div>

</div>

    <script src="script.js"></script>

</body>
</html>
